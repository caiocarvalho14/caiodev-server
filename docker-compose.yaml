services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft_server
    restart: unless-stopped

    ports:
      - "25565:25565/tcp"
      - "19132:19132/udp"

    environment:
      EULA: "TRUE"

      TYPE: PAPER
      VERSION: LATEST
      MEMORY: 4G
      TZ: America/Fortaleza

      MOTD: "CAIODEV SERVER"
      MODE: survival
      DIFFICULTY: hard
      ONLINE_MODE: "TRUE"

      SEED: "6944174826991112"

      MODRINTH_PROJECTS: |
        geyser
        floodgate
      
      MODRINTH_ALLOWED_VERSION_TYPE: beta

      ENABLE_ROLLING_LOGS: "true"

    volumes:
      - ./minecraft/data:/data

    networks:
      - minecraft

  #monitor:
  #  container_name: minecraft_monitor
  #  restart: unless-stopped
  #  working_dir: /app
  # command: sleep infinity
  # volumes:
  #   - ./monitor:/app
  # depends_on:
  #   - minecraft
  # networks:
  #   - minecraft

networks:
  minecraft:
    driver: bridge