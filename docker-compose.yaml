services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped

    ports:
      - "5678:5678"

    environment:
      - TZ=America/Fortaleza
      - N8N_HOST=192.168.0.46
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://192.168.0.46:5678/
      - GENERIC_TIMEZONE=America/Fortaleza

    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data: