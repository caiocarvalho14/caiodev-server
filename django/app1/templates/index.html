<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidor Django</title>
</head>
<body>
    <h1>Bem-vindo ao Servidor Django!</h1>
    <h2>Informações do Servidor</h2>
    <p>Tempo de atividade: {{ uptime_seconds }} segundos</p>
    <p>Total de cliques: {{ total_cliques }}</p>
    <form action="/" method="post">
        {% csrf_token %}
        <button type="submit">Enviar</button>
    </form>
</body>
<script>
    setInterval(function() {
        fetch('/uptime')
            .then(response => response.json())
            .then(data => {
                document.querySelector('p').textContent = `Tempo de atividade: ${data.uptime} segundos`;
            });
    }, 1000);
</script>
</html>
